<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIMUX Interview Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
body{background:#F2F0EB;color:#18181B;display:flex;align-items:stretch;justify-content:center}

/* ─── SHELL ─────────────────────────────────────── */
.shell{
  display:flex;flex-direction:column;
  width:100%;max-width:780px;height:100vh;
  background:#fff;
  box-shadow:0 0 0 1px rgba(0,0,0,.06),0 12px 48px rgba(0,0,0,.1);
  position:relative;overflow:hidden;
}

/* ─── HEADER ─────────────────────────────────────── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;flex-shrink:0;
  border-bottom:1px solid #E8E5DF;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(12px);z-index:20;
}
.hdr-brand{display:flex;align-items:center;gap:11px}
.hdr-icon{
  width:38px;height:38px;border-radius:11px;
  background:#18181B;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.hdr-name{font-size:15px;font-weight:700;color:#18181B;letter-spacing:-.01em}
.hdr-sub {font-size:12px;color:#71717A;margin-top:1px}
.hdr-actions{display:flex;align-items:center;gap:8px}
.status{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;
  padding:4px 10px;border-radius:20px;
  transition:all .2s;
}
.status.idle{color:#71717A;background:#F4F4F5;border:1px solid #E4E4E7}
.status.live{color:#16A34A;background:#F0FDF4;border:1px solid #BBF7D0}
.status::before{content:'';width:6px;height:6px;border-radius:50%}
.status.idle::before{background:#A1A1AA}
.status.live::before{background:#16A34A;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ico-btn{
  width:34px;height:34px;border-radius:9px;
  background:transparent;border:1px solid #E8E5DF;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .18s;color:#71717A;
}
.ico-btn:hover{background:#F4F4F5;color:#18181B}

/* ─── SESSION BAR ───────────────────────────────── */
.sbar{
  display:none;align-items:center;gap:8px;
  padding:9px 22px;flex-shrink:0;
  background:#EFF6FF;border-bottom:1px solid #BFDBFE;
  font-size:13px;font-weight:600;color:#1D4ED8;
  animation:slideD .3s ease both;
}
.sbar.on{display:flex}
@keyframes slideD{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ─── CHAT ───────────────────────────────────────── */
.chat{
  flex:1;overflow-y:auto;
  padding:28px 22px 8px;
  display:flex;flex-direction:column;gap:0;
  scroll-behavior:smooth;
}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#E8E5DF;border-radius:4px}

/* ─── WELCOME CARD ───────────────────────────────── */
.wcard{
  background:#FAFAF8;border:1px solid #E8E5DF;
  border-radius:22px;padding:34px 30px;
  max-width:420px;width:100%;margin:auto;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.04),0 12px 40px rgba(0,0,0,.07);
  animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.wcard-ico {font-size:42px;margin-bottom:14px;display:block}
.wcard-ttl {font-size:21px;font-weight:800;letter-spacing:-.02em;color:#18181B;margin-bottom:7px}
.wcard-txt {font-size:14px;color:#71717A;line-height:1.65;margin-bottom:26px}
.fld{display:flex;flex-direction:column;gap:5px;text-align:left;margin-bottom:14px}
.lbl{font-size:11.5px;font-weight:700;color:#57534E;letter-spacing:.05em;text-transform:uppercase}
.inp{
  width:100%;padding:13px 15px;
  font-family:inherit;font-size:15px;font-weight:500;color:#18181B;
  background:#fff;border:1.5px solid #E8E5DF;border-radius:11px;
  outline:none;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;
}
.inp::placeholder{color:#C2BDB8}
.inp:focus{border-color:#18181B;box-shadow:0 0 0 3px rgba(24,24,27,.08)}
.inp.err{border-color:#DC2626;box-shadow:0 0 0 3px rgba(220,38,38,.08)}
.ferr{font-size:12px;color:#DC2626;display:none}
.ferr.on{display:block}
.btn-go{
  width:100%;padding:14px;
  font-family:inherit;font-size:15px;font-weight:700;
  color:#fff;background:#18181B;border:none;
  border-radius:11px;cursor:pointer;
  box-shadow:0 3px 12px rgba(24,24,27,.22);
  display:flex;align-items:center;justify-content:center;gap:7px;
  letter-spacing:-.01em;transition:all .18s;
}
.btn-go:hover{background:#3F3F46;transform:translateY(-1px);box-shadow:0 5px 18px rgba(24,24,27,.28)}
.btn-go:active{transform:translateY(0)}
.note{font-size:12px;color:#A1A1AA;margin-top:11px;line-height:1.5}

/* ─── DIVIDER ────────────────────────────────────── */
.divider{
  display:flex;align-items:center;gap:10px;
  color:#A1A1AA;font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  margin:6px 0 18px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E8E5DF}

/* ─── MSG GROUPS ─────────────────────────────────── */
.mg{
  display:flex;flex-direction:column;
  margin-bottom:16px;
  animation:msgIn .25s cubic-bezier(.4,0,.2,1) both;
}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.mg.user{align-items:flex-end}
.mg.ai  {align-items:flex-start}
.mlabel{
  font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:#A1A1AA;margin-bottom:5px;
}
.mg.user .mlabel{color:#4B5563}
.bubble{
  max-width:76%;padding:12px 16px;
  font-size:14.5px;line-height:1.68;
  white-space:pre-wrap;word-break:break-word;
  border-radius:18px;
}
.mg.ai .bubble{
  background:#F4F4F5;color:#18181B;
  border:1px solid #E8E5DF;
  border-top-left-radius:4px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.mg.user .bubble{
  background:#18181B;color:#FAFAFA;
  border-top-right-radius:4px;
}
.bubble strong{font-weight:700}
.bubble em{opacity:.85}
.mmeta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.mtime{font-size:11px;color:#A1A1AA}

/* ─── AUDIO BTN ──────────────────────────────────── */
.btn-replay{
  display:inline-flex;align-items:center;gap:5px;
  font-family:inherit;font-size:12px;font-weight:600;color:#71717A;
  background:#fff;border:1px solid #E8E5DF;border-radius:20px;
  padding:3px 10px;cursor:pointer;transition:all .18s;
}
.btn-replay:hover{background:#F4F4F5;color:#18181B;border-color:#A1A1AA}
.btn-replay.playing{color:#16A34A;border-color:#BBF7D0;background:#F0FDF4}
.aload{font-size:12px;color:#A1A1AA;font-weight:500}

/* ─── TYPING ─────────────────────────────────────── */
.typing-group{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:16px}
.typing-bub{
  background:#F4F4F5;border:1px solid #E8E5DF;
  border-radius:18px;border-top-left-radius:4px;
  padding:14px 18px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
  display:flex;align-items:center;gap:5px;
}
.dot{width:7px;height:7px;border-radius:50%;background:#A1A1AA;animation:db 1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes db{0%,80%,100%{transform:translateY(0);background:#A1A1AA}40%{transform:translateY(-6px);background:#71717A}}

/* ─── ERROR ──────────────────────────────────────── */
.ebub{
  display:flex;align-items:flex-start;gap:10px;
  background:#FEF2F2;border:1px solid #FECACA;
  border-radius:14px;padding:12px 16px;
  font-size:13.5px;color:#DC2626;
  margin-bottom:16px;max-width:76%;
  animation:msgIn .25s ease both;
}

/* ─── INPUT AREA ──────────────────────────────────── */
.input-shell{
  padding:12px 22px 18px;flex-shrink:0;
  border-top:1px solid #E8E5DF;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(12px);
}
.crow{
  display:flex;justify-content:flex-end;
  font-size:11px;color:#A1A1AA;
  margin-bottom:6px;transition:color .18s;
}
.crow.warn{color:#DC2626}
.irow{display:flex;gap:10px;align-items:flex-end}
.tawrap{flex:1}
#mi{
  width:100%;min-height:50px;max-height:160px;
  padding:13px 16px;
  font-family:inherit;font-size:15px;color:#18181B;
  background:#F2F0EB;border:1.5px solid #E8E5DF;
  border-radius:14px;resize:none;outline:none;
  line-height:1.5;overflow-y:hidden;display:block;
  transition:border-color .18s,box-shadow .18s;
}
#mi::placeholder{color:#A1A1AA}
#mi:focus{border-color:#18181B;box-shadow:0 0 0 3px rgba(24,24,27,.07);background:#fff}
#mi:disabled{opacity:.5;cursor:not-allowed}
.bsend{
  width:50px;height:50px;border-radius:14px;
  background:#18181B;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .18s;
  box-shadow:0 3px 10px rgba(24,24,27,.2);
}
.bsend:hover:not(:disabled){background:#3F3F46;transform:translateY(-1px);box-shadow:0 5px 16px rgba(24,24,27,.26)}
.bsend:active:not(:disabled){transform:translateY(0)}
.bsend:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.bsend svg{width:19px;height:19px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.hint{font-size:11.5px;color:#A1A1AA;text-align:center;margin-top:8px}
.kbd{display:inline-block;background:#E8E5DF;border-radius:4px;padding:1px 5px;font-size:10.5px;font-family:inherit}

/* ─── MODAL ──────────────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;z-index:200;
  background:rgba(24,24,27,.5);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fbg .25s ease both;
}
.modal-bg.out{animation:fbgO .2s ease both;pointer-events:none}
@keyframes fbg {from{opacity:0}to{opacity:1}}
@keyframes fbgO{from{opacity:1}to{opacity:0}}
.mcard{
  background:#fff;border-radius:22px;padding:36px 32px;
  max-width:400px;width:100%;
  box-shadow:0 24px 80px rgba(0,0,0,.18);
  animation:cup .3s cubic-bezier(.4,0,.2,1) both;
}
@keyframes cup{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mico  {font-size:40px;margin-bottom:14px;display:block}
.mttl  {font-size:20px;font-weight:800;letter-spacing:-.02em;color:#18181B;margin-bottom:7px}
.msub  {font-size:14px;color:#71717A;line-height:1.6;margin-bottom:22px}

/* ─── TOAST ──────────────────────────────────────── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#18181B;color:#fff;
  font-size:13px;font-weight:600;
  padding:10px 20px;border-radius:24px;
  box-shadow:0 4px 24px rgba(0,0,0,.18);
  z-index:300;opacity:0;
  transition:opacity .22s ease,transform .22s ease;
  pointer-events:none;white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#DC2626}

/* ─── RESPONSIVE ──────────────────────────────────── */
@media(max-width:500px){
  .chat{padding:18px 14px 6px}
  .hdr,.input-shell{padding-left:14px;padding-right:14px}
  .sbar{padding:8px 14px}
  .bubble{max-width:90%}
  #mi{font-size:16px}
  .mcard,.wcard{padding:26px 18px}
}
</style>
</head>
<body>

<!-- ══ MODAL ══ -->
<div class="modal-bg" id="modal" style="display:none">
  <div class="mcard">
    <span class="mico">👋</span>
    <div class="mttl">What's your name?</div>
    <div class="msub">I'll use your name throughout our session to make the interview feel more natural and personalized.</div>
    <div class="fld">
      <label class="lbl" for="mname">Your first name</label>
      <input class="inp" type="text" id="mname" placeholder="e.g. Maria" maxlength="40" onkeydown="if(event.key==='Enter'){event.preventDefault();saveName()}"/>
      <span class="ferr" id="merr">Please enter your name to continue.</span>
    </div>
    <button class="btn-go" onclick="saveName()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Save &amp; Continue
    </button>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="shell">

  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-icon">🎙️</div>
      <div>
        <div class="hdr-name">AI Interview Simulator</div>
        <div class="hdr-sub" id="hsub">Practice. Improve. Get hired.</div>
      </div>
    </div>
    <div class="hdr-actions">
      <div class="status idle" id="sbadge">Ready</div>
      <button class="ico-btn" title="Change name" onclick="changeName()">✏️</button>
      <button class="ico-btn" title="New session" onclick="newSession()">🔄</button>
    </div>
  </div>

  <div class="sbar" id="sbar">
    <span>💼</span><span id="stext"></span>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-shell" id="ishell" style="display:none">
    <div class="crow" id="crow">0 / 1000</div>
    <div class="irow">
      <div class="tawrap">
        <textarea id="mi" placeholder="Type your answer…" maxlength="1000" rows="1"
          onkeydown="ikey(event)" oninput="ichange(this)"></textarea>
      </div>
      <button class="bsend" id="bsend" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="hint"><span class="kbd">Enter</span> send &nbsp;·&nbsp; <span class="kbd">Shift+Enter</span> new line</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ── WEBHOOKS ─────────────────────────────────────── */
const TEXT_WEBHOOK_URL  = "https://hook.us2.make.com/49o5vxsgya86k4d6sj51uy3igyncqc04";
const AUDIO_WEBHOOK_URL = "https://hook.us2.make.com/55omddvbjaew83nq0ux8zb7cmx3iyglc";

/* ── STATE ────────────────────────────────────────── */
let userName    = '';
let jobTitle    = '';
let isWaiting   = false;
let typingNode  = null;
let sessionOn   = false;
let prevAudioURL = null;

/* ── DOM ──────────────────────────────────────────── */
const chatEl   = document.getElementById('chat');
const ishell   = document.getElementById('ishell');
const mi       = document.getElementById('mi');
const bsend    = document.getElementById('bsend');
const sbadge   = document.getElementById('sbadge');
const hsub     = document.getElementById('hsub');
const sbar     = document.getElementById('sbar');
const stext    = document.getElementById('stext');
const toastEl  = document.getElementById('toast');
const crow     = document.getElementById('crow');
const modal    = document.getElementById('modal');

/* ── INIT ─────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('iv_name');
  if (saved && saved.trim()) {
    userName = saved.trim();
    buildWelcome();
  } else {
    showModal();
  }
});

/* ── MODAL ────────────────────────────────────────── */
function showModal() {
  modal.style.display = 'flex';
  setTimeout(() => { document.getElementById('mname').focus(); }, 80);
}
function hideModal() {
  modal.classList.add('out');
  setTimeout(() => { modal.style.display = 'none'; modal.classList.remove('out'); }, 210);
}
function saveName() {
  const inp = document.getElementById('mname');
  const err = document.getElementById('merr');
  inp.classList.remove('err'); err.classList.remove('on');
  const v = inp.value.trim();
  if (!v) { inp.classList.add('err'); err.classList.add('on'); inp.focus(); return; }
  userName = v;
  localStorage.setItem('iv_name', v);
  hideModal();
  buildWelcome();
}
function changeName() {
  localStorage.removeItem('iv_name');
  const inp = document.getElementById('mname');
  const err = document.getElementById('merr');
  inp.value = ''; inp.classList.remove('err'); err.classList.remove('on');
  showModal();
}

/* ── WELCOME CARD ─────────────────────────────────── */
function buildWelcome() {
  chatEl.innerHTML = '';
  const c = document.createElement('div');
  c.className = 'wcard'; c.id = 'wcard';
  c.innerHTML =
    '<span class="wcard-ico">💼</span>' +
    '<div class="wcard-ttl">Hi, ' + x(userName) + '! 👋</div>' +
    '<div class="wcard-txt">Enter the position you\'re applying for. The AI interviewer will ask questions, give feedback, and read responses aloud automatically.</div>' +
    '<div class="fld">' +
      '<label class="lbl" for="wjob">Position applying for</label>' +
      '<input class="inp" type="text" id="wjob" placeholder="e.g. Product Manager, UX Designer…" maxlength="80"' +
      ' onkeydown="if(event.key===\'Enter\'){event.preventDefault();startSession()}"/>' +
      '<span class="ferr" id="wjerr">Please enter the job position.</span>' +
    '</div>' +
    '<button class="btn-go" onclick="startSession()">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>' +
      'Start Interview' +
    '</button>' +
    '<div class="note">🔒 Private · AI feedback · 🔊 Voice responses</div>';
  chatEl.appendChild(c);
}

/* ── START SESSION ────────────────────────────────── */
function startSession() {
  const jEl = document.getElementById('wjob');
  const jEr = document.getElementById('wjerr');
  if (!jEl) return;
  jEl.classList.remove('err'); jEr.classList.remove('on');
  const j = jEl.value.trim();
  if (!j) { jEl.classList.add('err'); jEr.classList.add('on'); jEl.focus(); return; }
  jobTitle = j;

  const card = document.getElementById('wcard');
  card.style.transition = 'opacity .2s ease,transform .2s ease';
  card.style.opacity = '0'; card.style.transform = 'scale(.97)';

  setTimeout(() => {
    card.remove();
    addDiv('Today');
    ishell.style.display = 'block';
    sessionOn = true;

    hsub.textContent = x(userName) + ' · ' + x(jobTitle);
    sbadge.className = 'status live'; sbadge.textContent = 'Live';
    stext.textContent = '💼 Interviewing for: ' + x(jobTitle);
    sbar.classList.add('on');

    addAI(
      'Hi ' + x(userName) + '! 👋 Welcome to your interview for the **' + x(jobTitle) + '** position.\n\n' +
      'Let\'s get started right away.\n\n' +
      '**Tell me about yourself** — your background, key experiences, and what draws you to this opportunity.',
      true
    );
    mi.focus();
  }, 220);
}

/* ── NEW SESSION ──────────────────────────────────── */
function newSession() {
  if (sessionOn && !confirm('Start a new session? Current chat will be cleared.')) return;
  chatEl.innerHTML = '';
  ishell.style.display = 'none';
  sessionOn = false; jobTitle = ''; prevAudioURL = null;
  sbar.classList.remove('on');
  sbadge.className = 'status idle'; sbadge.textContent = 'Ready';
  hsub.textContent = 'Practice. Improve. Get hired.';
  buildWelcome();
}

/* ── HELPERS ──────────────────────────────────────── */
function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmt(raw) {
  return x(raw)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}
function ts() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function scrollD() { setTimeout(() => { chatEl.scrollTop = chatEl.scrollHeight; }, 50); }
function toast(msg, type) {
  toastEl.textContent = msg;
  toastEl.className = 'toast on' + (type==='err'?' err':'');
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(() => { toastEl.className = 'toast'; }, 3600);
}

/* ── DOM BUILDERS ──────────────────────────────────── */
function addDiv(label) {
  const d = document.createElement('div');
  d.className = 'divider'; d.textContent = label;
  chatEl.appendChild(d);
}

function addUser(text) {
  const g = document.createElement('div');
  g.className = 'mg user';
  g.innerHTML =
    '<div class="mlabel">You</div>' +
    '<div class="bubble">' + fmt(text) + '</div>' +
    '<div class="mmeta"><span class="mtime">' + ts() + '</span></div>';
  chatEl.appendChild(g); scrollD();
}

function addAI(text, withAudio) {
  killTyping();
  const g   = document.createElement('div');
  g.className = 'mg ai';
  const mid = 'am' + Date.now();
  g.innerHTML =
    '<div class="mlabel">🤖 Alex · AI Interviewer</div>' +
    '<div class="bubble">' + fmt(text) + '</div>' +
    '<div class="mmeta" id="' + mid + '"><span class="mtime">' + ts() + '</span></div>';
  chatEl.appendChild(g); scrollD();
  if (withAudio) getAudio(text, document.getElementById(mid));
}

function addError(msg) {
  killTyping();
  const d = document.createElement('div');
  d.className = 'ebub';
  d.innerHTML = '<span>⚠️</span><span>' + x(msg) + '</span>';
  chatEl.appendChild(d); scrollD();
}

function showTyping() {
  killTyping();
  const g = document.createElement('div');
  g.className = 'typing-group'; g.id = 'tnode';
  g.innerHTML =
    '<div class="mlabel">🤖 Alex · AI Interviewer</div>' +
    '<div class="typing-bub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chatEl.appendChild(g); scrollD(); typingNode = g;
}
function killTyping() {
  if (typingNode) { typingNode.remove(); typingNode = null; }
  const e = document.getElementById('tnode'); if (e) e.remove();
}

/* ── SEND MESSAGE ──────────────────────────────────── */
async function sendMsg() {
  if (isWaiting) return;
  const txt = mi.value.trim();
  if (!txt) { toast('✏️  Please type your answer first.'); mi.focus(); return; }

  addUser(txt);
  mi.value = ''; mi.style.height = 'auto';
  crow.textContent = '0 / 1000'; crow.classList.remove('warn');

  isWaiting = true; bsend.disabled = true; mi.disabled = true;
  showTyping();

  try {
    const res = await fetch(TEXT_WEBHOOK_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: txt, name: userName, job: jobTitle })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reply = await res.text();
    addAI((reply && reply.trim()) ? reply.trim() : "Interesting. Could you elaborate on that?", true);
  } catch (e) {
    addError("Couldn't reach the server. Please check your connection and try again.");
    toast('Connection error — please retry.', 'err');
    console.error('[TEXT]', e);
  } finally {
    isWaiting = false; bsend.disabled = false; mi.disabled = false; mi.focus();
  }
}

/* ── AUDIO ──────────────────────────────────────────── */
async function getAudio(text, metaEl) {
  const lid = 'al' + Date.now();
  if (metaEl) {
    const span = document.createElement('span');
    span.id = lid; span.className = 'aload'; span.textContent = '🎵 Loading voice…';
    metaEl.appendChild(span);
  }
  try {
    const res = await fetch(AUDIO_WEBHOOK_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ text: text })
    });
    console.log("AUDIO STATUS:", res.status);
console.log("AUDIO TYPE:", res.headers.get("content-type"));
    
    if (!res.ok) {
  const errText = await res.text();
  console.error("AUDIO ERROR BODY:", errText);
  throw new Error('Audio HTTP ' + res.status);
}

    const blob = await res.blob();
    console.log("BLOB TYPE:", blob.type);
    if (prevAudioURL) { URL.revokeObjectURL(prevAudioURL); }
    const url  = URL.createObjectURL(blob);
    prevAudioURL = url;

    const le = document.getElementById(lid); if (le) le.remove();

    playURL(url);

    if (metaEl) {
      const btn = document.createElement('button');
      btn.className   = 'btn-replay';
      btn.dataset.url = url;
      btn.innerHTML   =
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' +
          '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>' +
          '<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>' +
          '<path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>' +
        '</svg> Replay';
      btn.onclick = function() { replayBtn(this); };
      metaEl.appendChild(btn);
      scrollD();
    }
  } catch (e) {
    const le = document.getElementById(lid); if (le) le.remove();
    console.warn('[AUDIO]', e);
  }
}

function playURL(url) {
  const a = document.createElement("audio");

  a.src = url;
  a.preload = "auto";
  a.volume = 1;
  a.muted = false;

  document.body.appendChild(a);

  a.play().catch(err => {
    console.warn("Autoplay bloqueado:", err);
  });
}
function replayBtn(btn) {
  if (!btn.dataset.url) return;
  btn.classList.add('playing');
  const a = new Audio(btn.dataset.url);
  a.play().catch(e => console.warn('Replay blocked:', e));
  a.onended = () => btn.classList.remove('playing');
}

/* ── INPUT ──────────────────────────────────────────── */
function ikey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function ichange(el) {
  const n = el.value.length;
  crow.textContent = n + ' / 1000';
  crow.classList.toggle('warn', n > 900);
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
</script>
</body>
